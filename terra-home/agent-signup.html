<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agent Signup</title>

<link rel="stylesheet" href="auth.css">

</head>

<body>

<div class="auth-container long-form">

<h2>Register as Agent</h2>

<form id="agentSignupForm">

<input 
type="text"
id="agentName"
placeholder="Full Name"
required>

<input 
type="email"
id="agentSignupEmail"
placeholder="Email Address"
required>

<input 
type="tel"
id="agentPhone"
placeholder="Phone Number"
required>

<input 
type="text"
id="agentCompany"
placeholder="Company Name"
required>

<input 
type="text"
id="agentAddress"
placeholder="Office Address"
required>

<input 
type="file"
id="agentID"
accept="image/*">

<input 
type="password"
id="agentSignupPassword"
placeholder="Create Password"
required>

<button type="submit">

Register Agent

</button>

</form>

<p>

Already registered?

<a href="agent-login.html">

Login Here

</a>

</p>

</div>

<script src="auth.js"></script>

</body>

</html>
